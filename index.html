<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, padding-top=env(safe-area-inset-top)">
    <title>Petualangan Keberagaman Indonesia</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }
        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Menu Utama */
        #main-menu {
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://images.unsplash.com/photo-1596402184320-417e7178b2cd?q=80&w=1000') no-repeat center center;
            background-size: cover;
            height: 100vh;
            max-width: 100%;
            border-radius: 0;
        }
        h1 {
            font-size: 3rem;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .subtitle {
            font-size: 1.2rem;
            color: #475569;
            margin-bottom: 40px;
            font-weight: 500;
        }
        .btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.6);
        }
        .btn:active {
            transform: translateY(1px);
        }
        /* Papan Permainan */
        .game-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
        }
        .cell {
            aspect-ratio: 1;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            position: relative;
            transition: all 0.3s ease;
            color: #64748b;
        }
        .cell.active-cell {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #1d4ed8;
        }
        .player-token {
            width: 24px;
            height: 24px;
            background: #ef4444;
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        /* Kontrol */
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .dice {
            width: 60px;
            height: 60px;
            background: white;
            border: 3px solid #1e293b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* Kartu Kuis */
        .quiz-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .quiz-card h3 {
            margin-bottom: 20px;
            color: #0f172a;
            font-size: 1.3rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .option-btn {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            color: #334155;
        }
        .option-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active">
        <h1>Petualangan<br>Keberagaman Indonesia</h1>
        <p class="subtitle">Game Edukasi Papan Interaktif</p>
        <button class="btn" onclick="startGame()">MULAI PETUALANGAN!</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-container">
            <h2 id="info-status">Giliran Kamu! Lempar Dadu.</h2>
            <div class="board" id="board"></div>
            <div class="controls">
                <div class="dice" id="dice-view">-</div>
                <button class="btn" id="roll-btn" onclick="rollDice()">Kocok Dadu</button>
            </div>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="quiz-card">
            <h2 style="color: #f59e0b; margin-bottom: 10px;">Tantangan Budaya!</h2>
            <h3 id="question-text">Pertanyaan akan muncul di sini?</h3>
            <div class="options" id="options-container"></div>
        </div>
    </div>

    <script>
        // Data Kotak Papan Permainan
        const boardData = [
            "Mulai", "Aceh", "Sumut", "Sumbar", "Riau",
            "Jambi", "Sumsel", "Bengkulu", "Lampung", "Bangka",
            "Jakarta", "Jabar", "Jateng", "Yogyakarta", "Jatim",
            "Bali", "NTB", "NTT", "Kalbar", "Finish"
        ];

        // Bank Soal Kuis Nusantara
        const quizData = {
            "Aceh": { q: "Apa nama rumah adat dari daerah Aceh?", a: ["Rumah Gadang", "Krong Bade", "Joglo"], correct: 1 },
            "Sumut": { q: "Tari Tor-Tor adalah tarian tradisional dari suku...", a: ["Batak", "Minangkabau", "Jawa"], correct: 0 },
            "Sumbar": { q: "Rumah adat Sumatera Barat yang atapnya mirip tanduk kerbau disebut...", a: ["Rumah Gadang", "Rumah Honai", "Rumah Limas"], correct: 0 },
            "Jakarta": { q: "Kesenian boneka raksasa khas Betawi dinamakan...", a: ["Wayang Golek", "Ondel-Ondel", "Reog"], correct: 1 },
            "Jabar": { q: "Alat musik tradisional Jawa Barat yang terbuat dari bambu adalah...", a: ["Angklung", "Gamelan", "Sasando"], correct: 0 },
            "Yogyakarta": { q: "Apa nama rumah adat khas Yogyakarta dan Jawa Tengah?", a: ["Joglo", "Kebaya", "Tongkonan"], correct: 0 },
            "Bali": { q: "Upacara pembakaran jenazah di Bali disebut...", a: ["Rambu Solo", "Ngaben", "Sekaten"], correct: 1 },
            "NTT": { q: "Alat musik dipetik 'Sasando' berasal dari provinsi...", a: ["NTB", "NTT", "Maluku"], correct: 1 }
        };

        let playerPosition = 0;

        // Bikin Kotak Papan secara Otomatis
        function createBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            boardData.forEach((name, index) => {
                const cell = document.createElement('div');
                cell.className = `cell ${index === playerPosition ? 'active-cell' : ''}`;
                cell.innerHTML = `<div>${name}</div>`;
                
                if (index === playerPosition) {
                    const token = document.createElement('div');
                    token.className = 'player-token';
                    cell.appendChild(token);
                }
                boardElement.appendChild(cell);
            });
        }

        // Pindah Halaman/Screen
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Jalankan Game
        function startGame() {
            switchScreen('game-screen');
            createBoard();
        }

        // Logika Kocok Dadu
        function rollDice() {
            const rollBtn = document.getElementById('roll-btn');
            const diceView = document.getElementById('dice-view');
            rollBtn.disabled = true;

            let counter = 0;
            const interval = setInterval(() => {
                diceView.innerText = Math.floor(Math.random() * 6) + 1;
                counter++;
                if (counter > 8) {
                    clearInterval(interval);
                    const finalRoll = Math.floor(Math.random() * 6) + 1;
                    diceView.innerText = finalRoll;
                    movePlayer(finalRoll);
                    rollBtn.disabled = false;
                }
            }, 100);
        }

        // Jalankan Pion Player
        function movePlayer(steps) {
            playerPosition += steps;
            if (playerPosition >= boardData.length - 1) {
                playerPosition = boardData.length - 1;
                createBoard();
                alert("Selamat! Kamu Berhasil Menjelajahi Nusantara! 🏆🇮🇩");
                playerPosition = 0;
                switchScreen('main-menu');
                return;
            }

            createBoard();
            
            // Cek apakah kotak tersebut ada kuisnya
            const currentRegion = boardData[playerPosition];
            setTimeout(() => {
                if (quizData[currentRegion]) {
                    showQuiz(currentRegion);
                } else {
                    document.getElementById('info-status').innerText = `Kamu mendarat di ${currentRegion}. Aman!`;
                }
            }, 600);
        }

        // Tampilkan Pertanyaan Kuis
        function showQuiz(region) {
            const quiz = quizData[region];
            document.getElementById('question-text').innerText = quiz.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            quiz.a.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(idx, quiz.correct);
                container.appendChild(btn);
            });
            switchScreen('quiz-screen');
        }

        // Cek Jawaban Benar / Salah
        function checkAnswer(selected, correct) {
            if (selected === correct) {
                alert("Hebat! Jawabanmu BENAR 🎉");
            } else {
                alert("Sayang sekali, jawabanmu kurang tepat. Belajar lagi ya! 📝");
                playerPosition = Math.max(0, playerPosition - 2); // Hukuman mundur 2 kotak
            }
            switchScreen('game-screen');
            createBoard();
            document.getElementById('info-status').innerText = "Ayo lanjut melangkah!";
        }
    </script>
</body>
</html>
